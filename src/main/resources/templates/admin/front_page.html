{% extends 'admin/base.html' %}

{% block admin-content %}
<div class="vertical-flex-container">
	<div class="simple-panel">
		<div class="simple-panel-header"><h1>Welcome Message</h1></div>
		<div class="simple-panel-content">
			<form action="/admin/front_page/welcome_message" method="post">
				<div class="simple-column simple-center-60">
					<label for="message_box">Message:</label>
					<textarea id="message_box" name="message">{{ welcomeMessage }}</textarea>
					<input type="hidden" name="{{ _csrfParam }}" value="{{ _csrfToken }}">
					<input type="submit" value="Update">
				</div>
			</form>
		</div>
	</div>
</div>
{% endblock %}
