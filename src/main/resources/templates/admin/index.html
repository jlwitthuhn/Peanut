{% extends 'admin/base.html' %}

{% block admin-content %}
<div class="vertical-flex-container">
	<div class="simple-panel">
		<div class="simple-panel-header"><h1>Admin Index</h1></div>
		<div class="simple-panel-content horizontal-space-evenly">
			<table>
				{% for this_version in version_details %}
				<tr>
					<td>{{ this_version.a() }}</td>
					<td>{{ this_version.b() }}</td>
				</tr>
				{% endfor %}
			</table>
			<table>
				{% for this_version in runtime_details %}
				<tr>
					<td>{{ this_version.a() }}</td>
					<td>{{ this_version.b() }}</td>
				</tr>
				{% endfor %}
			</table>
		</div>
	</div>
</div>
{% endblock %}
