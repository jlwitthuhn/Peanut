{% extends 'admin/base.html' %}

{% block admin-content %}
<div class="vertical-flex-container">
	<div class="simple-panel">
		<div class="simple-panel-header"><h1>List Users</h1></div>
		<div class="simple-panel-content horizontal-space-evenly">
			<table>
				<tr>
					<th>ID</th>
					<th>Username</th>
					<th>Created</th>
				</tr>
				{% for this_user in users %}
				<tr>
					<td>{{ this_user.id }}</td>
					<td><a href="/profile/view/{{ this_user.id }}">{{ this_user.name }}</a></td>
					<td>{{ this_user.created }}</td>
				</tr>
				{% endfor %}
			</table>
		</div>
	</div>
</div>
{% endblock %}
